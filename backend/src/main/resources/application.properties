server.port=8080

spring.application.name=crowdshield-backend

# H2 Database Config
spring.datasource.url=jdbc:h2:mem:crowdshielddb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=password

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# Google Gemini API Key Config (Loaded from Environment GEMINI_API_KEY or backend/.env)
gemini.api.key=${GEMINI_API_KEY:YOUR_GEMINI_API_KEY}
